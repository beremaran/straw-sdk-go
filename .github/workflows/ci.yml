name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      GOPRIVATE: github.com/beremaran/*
    steps:
      - id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2
        with:
          app-id: ${{ vars.STRAW_RELEASE_APP_ID }}
          private-key: ${{ secrets.STRAW_RELEASE_APP_PRIVATE_KEY }}
          owner: beremaran
          repositories: straw-protos-go,straw-sdk-go
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Configure private module access
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: git config --global url."https://x-access-token:${APP_TOKEN}@github.com/".insteadOf "https://github.com/"
      - run: make check

