name: Update protocol binding

on:
  repository_dispatch:
    types: [go-binding-release]
  workflow_dispatch:
    inputs:
      tag:
        description: Exact straw-protos-go tag
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
      - name: Update exact tag and open PR
        env:
          GH_TOKEN: ${{ github.token }}
          DISPATCH_TAG: ${{ github.event.client_payload.tag }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          tag="$DISPATCH_TAG"; if [ -z "$tag" ]; then tag="$INPUT_TAG"; fi
          go get "github.com/beremaran/straw-protos-go@$tag"
          go mod tidy
          make check
          if git diff --quiet; then echo 'already current'; exit 0; fi
          branch="automation/protos-go-${tag#v}"
          git config user.name 'Straw Release Automation[bot]'
          git config user.email 'straw-release-automation[bot]@users.noreply.github.com'
          git switch -c "$branch"
          git add go.mod go.sum
          git commit -m "Update straw-protos-go to $tag"
          git push -u origin "$branch"
          gh pr create --title "Update straw-protos-go to $tag" --body "Pins the exact public binding tag and passes the standalone SDK suite." --base main --head "$branch"
